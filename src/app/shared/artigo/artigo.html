<article class="card-hardware animar-subir delay-6">
          <div class="card-imagem">
            <img [src]="data().imagem_url">
          </div>
          <div class="card-corpo">
            <span class="badge badge-sunset"><i class="fas fa-plug"></i> {{data().tipo}}</span>
            <div class="info-principal">
              <span class="fabricante">{{data().fabricante}}</span>
              <h2 class="modelo">{{data().titulo}}</h2>
              <p class="especificacao">{{data().especificacao_principal}}</p>
            </div>
            <div class="rodape-card">
              <p class="preco">{{ formatarPreco(data().preco) }}</p>
              <button class="btn-comprar">Veja mais <i class="fa fa-arrow-right" aria-hidden="true"></i></button>
            </div>
          </div>
        </article>
