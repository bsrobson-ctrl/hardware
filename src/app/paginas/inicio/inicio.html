<main class="container">

  <!-- BANNER HERO DA SEÇÃO -->
  <section class="hardware-banner">

    <!-- LADO ESQUERDO: Conteúdo textual -->
    <div class="banner-conteudo">
      <span class="hardware-banner-tag">
        <i class="fas fa-microchip"></i> Tecnologia de Ponta
      </span>
      <h1 class="hardware-banner-titulo">
        O Poder que<br>
        <span class="titulo-destaque">Define o Futuro</span>
      </h1>
      <p class="hardware-banner-sub">
        Hardware de alto desempenho, análises técnicas e os componentes que estão redefinindo os limites do possível.
      </p>

      <!-- BARRA DE BUSCA E BOTÃO: Barra de busca + botão de ação -->
      <div class="busca-dupla">
        <div class="busca-container">
          <span class="busca-icone"><i class="fas fa-search"></i></span>
          <input class="busca-input" type="text" placeholder="Buscar componente..." />
        </div>
        <button class="botao-artigos">
          <span class="botao-artigos-texto" routerLink="/vitrine">Ir para produtos</span>
          <i class="fas fa-arrow-right botao-artigos-icone"></i>
        </button>
      </div>
    </div>

    <!-- LADO DIREITO: Imagem de hardware -->
    <div class="banner-imagem-wrapper">
      <div class="banner-imagem-glow"></div>
      <img
        class="banner-imagem"
        src="hero-hardware.png"
        alt="GPU de alto desempenho com iluminação neon"
      />
      <div class="banner-badge-flutuante">
        <span class="badge-label">Next-Gen</span>
        <span class="badge-valor">RTX 5090</span>
      </div>
    </div>

  </section>

</main>
