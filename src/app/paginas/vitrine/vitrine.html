<main class="container">
    <!-- BANNER HERO DA SEÇÃO -->
    <section class="hardware-banner">
      <span class="hardware-banner-tag"><i class="fas fa-sparkles"></i> Performance Extrema</span>
      <h1 class="hardware-banner-titulo">Veja os melhores<br>Hardwares do momento</h1>
      <p class="hardware-banner-sub">
        Descubra os componentes mais potentes e inovadores para elevar seu setup a um novo patamar de desempenho e estilo.
      </p>
      <div class="banner-numero-fundo" aria-hidden="true">
        <svg class="banner-svg-deco" viewBox="0 0 320 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Chip / GPU abstrato -->
          <rect x="60" y="40" width="200" height="120" rx="18" stroke="url(#g1)" stroke-width="3" fill="none"/>
          <rect x="90" y="66" width="140" height="68" rx="10" stroke="url(#g1)" stroke-width="2" fill="none" opacity="0.6"/>
          <!-- pinos laterais esquerda -->
          <line x1="60" y1="75"  x2="38" y2="75"  stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="60" y1="95"  x2="38" y2="95"  stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="60" y1="115" x2="38" y2="115" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="60" y1="135" x2="38" y2="135" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <!-- pinos laterais direita -->
          <line x1="260" y1="75"  x2="282" y2="75"  stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="260" y1="95"  x2="282" y2="95"  stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="260" y1="115" x2="282" y2="115" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="260" y1="135" x2="282" y2="135" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <!-- pinos topo -->
          <line x1="110" y1="40" x2="110" y2="18" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="140" y1="40" x2="140" y2="18" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="180" y1="40" x2="180" y2="18" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="210" y1="40" x2="210" y2="18" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <!-- pinos base -->
          <line x1="110" y1="160" x2="110" y2="182" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="140" y1="160" x2="140" y2="182" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="180" y1="160" x2="180" y2="182" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="210" y1="160" x2="210" y2="182" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
          <!-- núcleo central -->
          <rect x="128" y="82" width="64" height="36" rx="6" fill="url(#g1)" opacity="0.18"/>
          <rect x="128" y="82" width="64" height="36" rx="6" stroke="url(#g1)" stroke-width="1.5" fill="none"/>
          <!-- label GPU -->
          <text x="160" y="105" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="url(#g1)" opacity="0.9">GPU</text>
          <defs>
            <linearGradient id="g1" x1="60" y1="40" x2="260" y2="160" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#f97316"/>
              <stop offset="50%" stop-color="#ec4899"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
    </section>

    <!-- BARRA DE BUSCA E FILTROS RÁPIDOS -->
    <div class="hardware-controles">
      <div class="busca-container">
        <span class="busca-icone"><i class="fas fa-search"></i></span>
        <input class="busca-input" type="text" placeholder="Buscar..." />
      </div>

      <div class="filtros-lista">
        <button class="filtro-btn ativo">Todos</button>
        <button class="filtro-btn">Placa de Vídeo</button>
        <button class="filtro-btn">Processador</button>
        <button class="filtro-btn">Memória RAM</button>
        <button class="filtro-btn">Armazenamento</button>
        <button class="filtro-btn">Placa Mãe</button>
        <button class="filtro-btn">Fonte de Alimentação</button>
      </div>
    </div>

    <!-- GRADE DE HARDWARE (GRID LAYOUT) -->
    <section class="hardware-grid-container">
      <p class="hardware-grid-titulo">Destaques:</p>

      <div class="grid-hardware">

        @for (item of artigos(); track $index) {
          <app-artigo [data]="item"></app-artigo>
        }
        

      </div>
    </section>

    <!-- PAGINAÇÃO (FLEXBOX CENTRALIZADO) -->
    <div class="paginacao">
      <button class="paginacao-btn"><i class="fas fa-chevron-left"></i></button>
      <button class="paginacao-btn ativo">1</button>
      <button class="paginacao-btn">2</button>
      <button class="paginacao-btn">3</button>
      <button class="paginacao-btn"><i class="fas fa-chevron-right"></i></button>
    </div>
  </main>
