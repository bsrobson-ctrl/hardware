<main class="container">
    <!-- BANNER HERO DA SEÇÃO -->
    <section class="hardware-banner">
      <span class="hardware-banner-tag"><i class="fas fa-sparkles"></i> Performance Extrema</span>
      <h1 class="hardware-banner-titulo">Veja os melhores<br>Hardwares do momento</h1>
      <p class="hardware-banner-sub">
        Descubra os componentes mais potentes e inovadores para elevar seu setup a um novo patamar de desempenho e estilo.
      </p>
      <div class="banner-numero-fundo" aria-hidden="true">
        <app-svg-gpu></app-svg-gpu>
      </div>
    </section>

    <!-- BARRA DE BUSCA E FILTROS RÁPIDOS -->
    <div class="hardware-controles">
      <div class="busca-container">
        <span class="busca-icone"><i class="fas fa-search"></i></span>
        <input class="busca-input" type="text" placeholder="Buscar..." />
      </div>

      <div class="filtros-lista">
        <button class="filtro-btn ativo">Todos</button>
        <button class="filtro-btn">Placa de Vídeo</button>
        <button class="filtro-btn">Processador</button>
        <button class="filtro-btn">Memória RAM</button>
        <button class="filtro-btn">Armazenamento</button>
        <button class="filtro-btn">Placa Mãe</button>
        <button class="filtro-btn">Fonte de Alimentação</button>
      </div>
    </div>

    <!-- GRADE DE HARDWARE (GRID LAYOUT) -->
    <section class="hardware-grid-container">
      <p class="hardware-grid-titulo">Destaques:</p>

      <div class="grid-hardware">

        @for (item of artigos(); track $index) {
          <app-artigo [data]="item"></app-artigo>
        }
        

      </div>
    </section>

    <!-- PAGINAÇÃO (FLEXBOX CENTRALIZADO) -->
    <div class="paginacao">
      <button class="paginacao-btn"><i class="fas fa-chevron-left"></i></button>
      <button class="paginacao-btn ativo">1</button>
      <button class="paginacao-btn">2</button>
      <button class="paginacao-btn">3</button>
      <button class="paginacao-btn"><i class="fas fa-chevron-right"></i></button>
    </div>
  </main>
