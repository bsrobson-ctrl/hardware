
    <main class="login-pagina">
        <div class="login-painel-esquerdo fundo-pontos">
        <div>
            <div class="linha-principal"></div>
            <h2 class="login-frase">
                Login <br>
            </h2>
        </div>
        

        </div>

        <div class="login-painel-direito">
            <div class="login-form-card card-brilho">
                <h1 class="login-titulo">Bem vindo de volta!</h1>
                <p class="login-subtitulo">Entre com sua conta para continuar</p>
                <form action="#" class="login-form">
                    <div class="campo-grupo">
                        <label for="email" class="campo-label">E-mail</label>
                        <input type="email" id="email" class="campo-input" placeholder="seu@email.com" required>
                    </div>
                    <div class="campo-grupo">
                        <label for="senha" class="campo-label">Senha</label>
                        <input type="password" id="senha" class="campo-input" placeholder="••••••••" required>
                        <a href="#" class="login-esqueceu">Esqueceu sua senha?</a>
                    </div>

                    <button class="btn-primario login-btn-submit" type="submit">Entrar na conta</button>
                </form>

                <p class="login-cadastro-link">Ainda não tem conta? <a href="../cadastro/index.html" class="login-link">Criar sua conta</a></p>
            </div>
        </div>
    </main>
